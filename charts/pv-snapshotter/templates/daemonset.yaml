apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
data:
  # viper reads /etc/humble-mun/daemon.yaml at startup (configName = "daemon").
  daemon.yaml: |+
    {{- if .Values.webhook.enabled }}
    http-bind-address: {{ .Values.webhook.bindAddress }}
    tls-cert-path: {{ .Values.webhook.tlsCertPath }}
    tls-key-path: {{ .Values.webhook.tlsKeyPath }}
    {{- else }}
    http-bind-address: 0.0.0.0:8080
    tls-cert-path: ""
    tls-key-path: ""
    {{- end }}
    unix-socket-path: {{ .Values.unixSocketPath }}
    containerd-socket: {{ .Values.containerdSocket }}
    annotation-prefix: {{ .Values.annotationPrefix }}
    overlay-snapshotter:
      root-path: {{ .Values.overlaySnapshotter.rootPath }}
      upper-dir-label: {{ .Values.overlaySnapshotter.upperDirLabel }}
      sync-remove: {{ .Values.overlaySnapshotter.syncRemove }}
      slow-chown: {{ .Values.overlaySnapshotter.slowChown }}
      {{- if .Values.overlaySnapshotter.mountOptions }}
      mount-options:
{{ toYaml .Values.overlaySnapshotter.mountOptions | indent 6 }}
      {{- end }}
    share-overlayfs-lowers: {{ .Values.overlaySnapshotter.shareOverlayfsLowers }}
    {{- if .Values.webhook.enabled }}
    webhook-enabled: true
    webhook-pvc-name-template: {{ .Values.webhook.pvcNameTemplate | quote }}
    webhook-pvc-selector-template: {{ .Values.webhook.pvcSelectorTemplate | quote }}
    webhook-max-owner-depth: {{ .Values.webhook.maxOwnerDepth }}
    webhook-default-runtime-class: {{ .Values.webhook.defaultRuntimeClass | quote }}
    webhook-runtime-class-suffix: {{ .Values.webhook.runtimeClassSuffix | quote }}
    webhook-bound-timeout: {{ .Values.webhook.boundTimeout }}
    webhook-state-mount-path: {{ .Values.webhook.stateMountPath | quote }}
    {{- /* webhook-annotation-templates is intentionally omitted from this
         ConfigMap. viper's insensitiviseMap lowercases all map keys when
         reading YAML, corrupting annotation key casing (e.g. "PVName" →
         "pvname"). The webhook reads annotation templates exclusively from
         the compiled-in pflag default (pkg/webhook/mutating.go), which
         bypasses YAML parsing and preserves the original casing.
         To override, pass --webhook-annotation-templates on the command line
         (not via this ConfigMap). */ -}}
    {{- else }}
    webhook-enabled: false
    {{- end }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      # automountServiceAccountToken is enabled when the webhook is active
      # (the webhook handler queries the Kubernetes API using in-cluster auth).
      # It is disabled otherwise to reduce the Pod's attack surface.
      automountServiceAccountToken: {{ .Values.webhook.enabled }}
      # hostPID exposes /proc/1/ns/mnt to the config sidecar so that the Go
      # setns(2) call can enter the host mount namespace and exec systemctl.
      hostPID: true
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      initContainers:
      # -----------------------------------------------------------------------
      # configure-containerd: native sidecar (restartPolicy: Always, K8s ≥ 1.29)
      #
      # Lifecycle:
      #   1. Wait until the pv-snapshotter daemon's /readyz returns 200
      #      (HTTP over Unix socket).
      #   2. Patch /etc/containerd/config.toml (idempotent, sparse append).
      #   3. If modified: enter host mount namespace via setns(2) + exec
      #      "systemctl restart containerd".
      #   4. Block on SIGTERM — keeps the sidecar alive for the Pod lifetime.
      # -----------------------------------------------------------------------
      - name: config
        image: {{ .Values.image }}
        # restartPolicy: Always makes this a native sidecar (K8s ≥ 1.29).
        restartPolicy: Always
        command:
        - daemon
        - config
        args:
        - --config-path=/host/etc/containerd/config.toml
        - --socket-path={{ .Values.unixSocketPath }}
        - --runtime-class-suffix={{ .Values.containerdConfig.suffix }}
        {{- if .Values.containerdConfig.runtimeClasses }}
        - --runtime-classes={{ .Values.containerdConfig.runtimeClasses | join "," }}
        {{- end }}
        env:
        - name: HM_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        securityContext:
          privileged: true
          runAsUser: 0
        volumeMounts:
        - name: host-etc-containerd
          mountPath: /host/etc/containerd
        - name: socket-dir
          mountPath: /var/run/pv-snapshotter

      containers:
      # -----------------------------------------------------------------------
      # Main container: the pv-snapshotter gRPC daemon (and webhook, if enabled).
      # All configuration is sourced from /etc/humble-mun/daemon.yaml (viper).
      # -----------------------------------------------------------------------
      - name: daemon
        image: {{ .Values.image }}
        command:
        - daemon
        {{- if and .Values.webhook.enabled .Values.webhook.annotationTemplates }}
        args:
        # --webhook-annotation-templates is passed as a command-line argument
        # rather than written to daemon.yaml.  viper's YAML parser runs
        # insensitiviseMap on every map value it reads, which lowercases all
        # map keys — corrupting annotation key casing (e.g. "var.PVName" →
        # "var.pvname").  Passing the flag on the command line routes it through
        # pflag's stringToString parser, which preserves casing exactly.
        # Format: key=value pairs joined by commas (CSV; quote pairs that
        # contain commas using standard CSV double-quote rules).
        - >-
          --webhook-annotation-templates=
          {{- $pairs := list -}}
          {{- range $k, $v := .Values.webhook.annotationTemplates -}}
            {{- $pairs = append $pairs (printf "%s=%s" $k $v) -}}
          {{- end -}}
          {{- $pairs | join "," }}
        {{- end }}
        env:
        - name: HM_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        securityContext:
          privileged: true
          runAsUser: 0
        {{- if .Values.webhook.enabled }}
        ports:
        - name: https
          containerPort: {{ last (splitList ":" .Values.webhook.bindAddress) }}
          protocol: TCP
        {{- end }}
        volumeMounts:
        # viper config file mounted as a single file via subPath.
        - name: config
          mountPath: /etc/humble-mun/daemon.yaml
          subPath: daemon.yaml
          readOnly: true
        # gRPC socket; containerd connects to this host path.
        - name: socket-dir
          mountPath: /var/run/pv-snapshotter
        # containerd client socket directory — mount the directory (not the
        # socket file) so that the path remains valid across containerd restarts.
        - name: containerd-run
          mountPath: /run/containerd
        # Kubelet volume tree must be visible so CSI mount paths resolve correctly.
        - name: kubelet-dir
          mountPath: /var/lib/kubelet
          mountPropagation: HostToContainer
        # Native overlay snapshotter root.
        - name: containerd-root
          mountPath: {{ .Values.overlaySnapshotter.rootPath }}
          mountPropagation: HostToContainer
        {{- if .Values.webhook.enabled }}
        # TLS certificate issued by cert-manager for the webhook HTTPS server.
        - name: tls
          mountPath: /etc/pv-snapshotter/pki
          readOnly: true
        {{- end }}
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
        startupProbe:
          httpGet:
            path: /healthz
            {{- if .Values.webhook.enabled }}
            port: {{ last (splitList ":" .Values.webhook.bindAddress) }}
            scheme: HTTPS
            {{- else }}
            port: 8080
            scheme: HTTP
            {{- end }}
          periodSeconds: 2
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /healthz
            {{- if .Values.webhook.enabled }}
            port: {{ last (splitList ":" .Values.webhook.bindAddress) }}
            scheme: HTTPS
            {{- else }}
            port: 8080
            scheme: HTTP
            {{- end }}
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            {{- if .Values.webhook.enabled }}
            port: {{ last (splitList ":" .Values.webhook.bindAddress) }}
            scheme: HTTPS
            {{- else }}
            port: 8080
            scheme: HTTP
            {{- end }}
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

      volumes:
      # viper config file: mounted as a single file via subPath.
      - name: config
        configMap:
          name: {{ .Release.Name }}
      # Host /etc/containerd — mounted into the config sidecar.
      - name: host-etc-containerd
        hostPath:
          path: /etc/containerd
          type: DirectoryOrCreate
      # pv-snapshotter gRPC socket directory (shared with containerd on the host).
      - name: socket-dir
        hostPath:
          path: /var/run/pv-snapshotter
          type: DirectoryOrCreate
      # containerd run directory: mounting the directory (not the socket file)
      # keeps the path valid across containerd restarts.
      - name: containerd-run
        hostPath:
          path: /run/containerd
          type: Directory
      # Kubelet volume tree.
      - name: kubelet-dir
        hostPath:
          path: /var/lib/kubelet
          type: Directory
      # containerd overlay snapshotter root.
      - name: containerd-root
        hostPath:
          path: {{ .Values.overlaySnapshotter.rootPath }}
          type: DirectoryOrCreate
      {{- if .Values.webhook.enabled }}
      # TLS certificate issued by cert-manager.
      - name: tls
        secret:
          secretName: {{ .Release.Name }}
      {{- end }}

